# Expose your documentation as JSON swagger compliant
app.swagger:
    path: /api/doc.json
    methods: GET
    defaults: { _controller: nelmio_api_doc.controller.swagger }

app.swagger_ui:
    path: /doc
    methods: GET
    # available themes : 
    #   - nelmio_api_doc.controller.swagger_ui 
    #   - nelmio_api_doc.controller.stoplight 
    #   - nelmio_api_doc.controller.redocly 
    defaults: { _controller: nelmio_api_doc.controller.redocly } 
